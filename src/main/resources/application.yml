server:
  port: 8080

spring:
  application:
    name: ms-gateway

  cloud:
    gateway:
      discovery:
        locator:
          enabled: true
          lower-case-service-id: true
      routes:

        - id: ms-cliente
          uri: lb://ms-cliente
          predicates:
            - Path=/api/clientes/**

        - id: ms-mesa
          uri: lb://ms-mesa
          predicates:
            - Path=/api/mesas/**

        - id: ms-carta
          uri: lb://ms-carta
          predicates:
            - Path=/api/productos/**

        - id: ms-pedido
          uri: lb://ms-pedido
          predicates:
            - Path=/api/pedidos/**

        - id: ms-boleta
          uri: lb://ms-boleta
          predicates:
            - Path=/api/boletas/**

        - id: ms-reporte
          uri: lb://ms-reporte
          predicates:
            - Path=/api/reportes/**

# --- Eureka Client ---
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
    fetch-registry: true
    register-with-eureka: true
  instance:
    prefer-ip-address: true

# --- Swagger / OpenAPI ---
springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html
    enabled: true

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
